<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <title>Tråd</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css?v=4.11.14">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css?v=4.11.14" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js?v=4.11.14"></script>
</head>
<body>
  <header class="wrap">
      <h1 style="text-align:left;">
        <a class="brand" href="/index.html" aria-label="Gå til forsiden">DOFbasen Notifikationer</a>
      </h1>
      <div class="toolbar">
        <button id="refresh-btn" aria-label="Opdater" title="Opdater siden" type="button"
                onclick="window.location.reload()">
          <span id="refresh-icon">🔄</span>
        </button>
        <button id="taetpaa-btn" aria-label="Observationer i nærheden" title="Observationer i nærheden" type="button"
                onclick="window.location.href='./taetpaa.html'">
          <span id="taetpaa-icon">📍</span>
        </button>
        <button id="info-btn" aria-label="Info" title="Info" type="button"
                onclick="window.location.href='./info.html'">
          <span id="info-icon">ℹ️</span>
        </button>
        <button id="settings-btn" aria-label="Indstillinger" title="Indstillinger" type="button"
                onclick="window.location.href='./settings.html'">
          <span id="settings-icon">⚙️</span>
        </button>
        <button id="theme-toggle" aria-label="Skift tema" onclick="this.blur()">
          <span id="theme-icon">☀️</span>
        </button>
      </div>
    </header>
  <main class="wrap">
    <div id="main"></div>
    
  </main>
  <script src="obsid.js?v=4.11.14"></script>
  <script src="app.js?v=4.11.14"></script>
  <script type="module">
  import WaveSurfer from 'https://cdn.jsdelivr.net/npm/wavesurfer.js@7/dist/wavesurfer.esm.js'
  import SpectrogramPlugin from 'https://cdn.jsdelivr.net/npm/wavesurfer.js@7/dist/plugins/spectrogram.esm.js'

  window.createWaveSurferWithSpectrogram = (containerId, url) => {
    const wavesurfer = WaveSurfer.create({
      container: `#${containerId}`,
      waveColor: '#a0c4ff',
      progressColor: '#4361ee',
      height: 64,
      normalize: true,
      url,
      plugins: [
        SpectrogramPlugin.create({
          container: `#${containerId}-spectrogram`,
          labels: true,
          height: 96,
        })
      ]
    });
    return wavesurfer;
  };
  </script>
</body>
</html>
